<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>iPod-loggen</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="iPod-loggen">
<meta name="theme-color" content="#EDEDEB">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EDEDEB;            /* iPod-vit plast */
  --card:#FFFFFF;
  --ink:#1D1D1F;
  --ink-soft:#6E6E73;
  --line:#DCDCDA;
  --lcd-bg:#C3D0BE;        /* klassisk iPod-LCD */
  --lcd-ink:#2A322A;
  --accent:#E8437F;        /* silhuett-reklamens rosa */
  --pos:#2E7D46;
  --neg:#C43D3D;
  --wheel:#F4F4F2;
  --radius:16px;
  --font-body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-lcd:'VT323',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  padding-bottom:180px;
}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px}

/* ---------- LCD-header ---------- */
header{
  padding:calc(env(safe-area-inset-top) + 16px) 16px 8px;
  max-width:680px;margin:0 auto;
}
.lcd{
  background:var(--lcd-bg);
  border-radius:10px;
  border:2px solid #9AA694;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.18), inset 0 -1px 0 rgba(255,255,255,.5);
  padding:10px 14px 12px;
  font-family:var(--font-lcd);
  color:var(--lcd-ink);
  position:relative;
  overflow:hidden;
}
.lcd::after{ /* svag skanlinje-känsla */
  content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.03) 2px 3px);
}
.lcd-top{display:flex;justify-content:space-between;font-size:15px;letter-spacing:1px;border-bottom:2px solid var(--lcd-ink);padding-bottom:2px;margin-bottom:6px}
.lcd-batt{display:inline-block}
.lcd-main{font-size:34px;line-height:1;letter-spacing:1px}
.lcd-sub{font-size:15px;letter-spacing:1px;margin-top:4px;display:flex;gap:14px;flex-wrap:wrap}

/* ---------- Lista ---------- */
main{max-width:680px;margin:0 auto;padding:8px 16px}
.toolbar{display:flex;gap:8px;margin:10px 0 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.chip{
  border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
  border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600;white-space:nowrap;
}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(min-width:560px){.grid{grid-template-columns:repeat(4,1fr)}}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;text-align:left;padding:0;display:flex;flex-direction:column;
  -webkit-tap-highlight-color:transparent;
}
.card:active{transform:scale(.98)}
.thumb{
  aspect-ratio:1/1.05;width:100%;object-fit:cover;background:#F2F2F0;display:block;
}
.thumb.ph{display:flex;align-items:center;justify-content:center;color:#C9C9C5;font-size:44px}
.card-body{padding:8px 9px 10px}
.card-name{font-weight:700;font-size:12.5px;line-height:1.25}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:5px;flex-wrap:wrap;gap:2px 6px}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;background:#EFEFED;color:var(--ink-soft)}
.badge.köpt{background:#EAF0FA;color:#3B5FA0}
.badge.reparation{background:#FBF1E2;color:#9A6A1F}
.badge.till_salu{background:#FCE9F1;color:var(--accent)}
.badge.såld{background:#E7F3EB;color:var(--pos)}
.card-profit{font-size:12px;font-weight:700}

/* ---------- Flikar ---------- */
.tabs{display:flex;gap:6px;margin:12px 0 2px;background:#E3E3E1;padding:4px;border-radius:12px}
.tab{flex:1;border:none;background:transparent;border-radius:9px;padding:8px;font-size:14px;font-weight:700;color:var(--ink-soft)}
.tab.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* ---------- Lager ---------- */
.stock-row{display:flex;align-items:center;gap:10px;padding:9px 0}
.stock-row + .stock-row{border-top:1px solid #F1F1EF}
.stock-thumb{width:44px;height:44px;border-radius:10px;object-fit:cover;background:#F2F2F0;border:1px solid var(--line);flex:none}
div.stock-thumb{display:flex;align-items:center;justify-content:center;color:#C9C9C5;font-size:17px}
.stock-info{flex:1;min-width:0}
.stock-name{font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stock-price{font-size:12.5px;color:var(--ink-soft)}
.qty{display:flex;align-items:center;gap:6px}
.qty button{width:28px;height:28px;border-radius:50%;border:1px solid var(--line);background:#fff;font-size:16px;font-weight:700;color:var(--ink);line-height:1}
.qty b{min-width:20px;text-align:center;font-size:15px}
.stock-photo-btn{
  width:44px;height:44px;border-radius:10px;border:2px dashed var(--line);
  background:#fff;color:#C9C9C5;font-size:18px;flex:none;overflow:hidden;padding:0;
}
.stock-photo-btn img{width:100%;height:100%;object-fit:cover}
.pos{color:var(--pos)} .neg{color:var(--neg)} .mut{color:var(--ink-soft)}
.empty{
  text-align:center;color:var(--ink-soft);padding:56px 20px;font-size:15px;line-height:1.6;
}

/* ---------- Klickhjul (lägg till) ---------- */
.wheel-wrap{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(env(safe-area-inset-bottom) + 14px);z-index:40;
}
.wheel{
  width:138px;height:138px;border-radius:50%;
  background:var(--wheel);
  border:1px solid var(--line);
  box-shadow:0 8px 24px rgba(0,0,0,.16), inset 0 1px 0 #fff;
  position:relative;color:#B4B4B0;font-size:12px;font-weight:700;letter-spacing:1.5px;
  padding:0;
}
.wheel span{position:absolute;display:flex;align-items:center;justify-content:center}
.wheel svg{width:17px;height:11px;fill:currentColor;display:block}
.wheel .menu{top:13px;left:0;right:0}
.wheel .play{bottom:15px;left:0;right:0}
.wheel .prev{left:14px;top:0;bottom:0}
.wheel .next{right:14px;top:0;bottom:0}
.wheel-center{
  position:absolute;inset:0;margin:auto;width:58px;height:58px;border-radius:50%;
  background:#fff;border:1px solid var(--line);
  color:var(--accent);
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 -2px 5px rgba(0,0,0,.06);
}
.wheel-center svg{width:24px;height:24px;fill:none}
.wheel:active .wheel-center{transform:scale(.94)}

/* ---------- Vyer / detalj ---------- */
.view{display:none}
.view.on{display:block}
.detail-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.btn-back{background:none;border:none;color:var(--accent);font-size:16px;font-weight:600;padding:6px 2px}
.detail-photo{
  width:100%;max-height:300px;object-fit:cover;border-radius:var(--radius);
  border:1px solid var(--line);background:#F2F2F0;display:block;
}
h2{font-size:22px;margin:12px 0 2px}
.sub{color:var(--ink-soft);font-size:14px;margin-bottom:14px}
.panel{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;margin-bottom:12px;
}
.panel h3{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:10px}
.row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;font-size:15px;gap:10px}
.row + .row{border-top:1px solid #F1F1EF}
.row .k{color:var(--ink-soft)}
.row .v{font-weight:600;text-align:right}
.row.total{border-top:2px solid var(--ink);margin-top:4px;padding-top:10px}
.row.total .v{font-size:18px;font-weight:800}
.del{background:none;border:none;color:var(--neg);font-size:13px;padding:2px 6px}
.mini-form{display:flex;gap:8px;margin-top:10px}
.mini-form input{flex:1;min-width:0}
.btn{
  background:var(--ink);color:#fff;border:none;border-radius:12px;
  padding:12px 16px;font-size:15px;font-weight:700;width:100%;
}
.btn.sec{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.accent{background:var(--accent)}
.btn.danger{background:#fff;color:var(--neg);border:1px solid var(--line)}
.btn.small{width:auto;padding:10px 14px;font-size:14px}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-row .btn{flex:1}

/* ---------- Formulär ---------- */
label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin:14px 0 5px}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;
  padding:11px 12px;color:var(--ink);appearance:none;
}
textarea{resize:vertical;min-height:70px}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
.photo-pick{
  border:2px dashed var(--line);border-radius:var(--radius);background:#fff;
  width:100%;padding:0;overflow:hidden;color:var(--ink-soft);font-size:14px;
  min-height:110px;display:flex;align-items:center;justify-content:center;
}
.photo-pick img{width:100%;max-height:240px;object-fit:cover;display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
footer{max-width:680px;margin:26px auto 0;padding:0 16px;display:flex;gap:8px}
footer .btn{font-size:13px;padding:10px}
.hint{font-size:12px;color:var(--ink-soft);margin-top:8px;text-align:center}
.update-toast{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(env(safe-area-inset-bottom) + 170px);z-index:60;
  background:var(--ink);color:#fff;border-radius:999px;
  padding:10px 10px 10px 18px;font-size:14px;font-weight:600;
  display:flex;align-items:center;gap:12px;white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
}
.update-toast button{
  background:var(--accent);color:#fff;border:none;border-radius:999px;
  padding:8px 14px;font-size:14px;font-weight:700;
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="lcd" id="lcd">
    <div class="lcd-top"><span>iPod-loggen</span><span class="lcd-batt" id="lcdCount">0 st</span></div>
    <div class="lcd-main" id="lcdProfit">0 kr</div>
    <div class="lcd-sub"><span id="lcdSold"></span><span id="lcdHours"></span></div>
  </div>
</header>

<main>
  <div class="tabs" id="tabs">
    <button class="tab on" data-tab="viewList">iPods</button>
    <button class="tab" data-tab="viewStock">Lager</button>
  </div>

  <!-- LISTA -->
  <section class="view on" id="viewList">
    <div class="toolbar" id="filters"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" hidden>
      Inga iPods ännu.<br>Tryck på mitten av klickhjulet för att lägga till din första.
    </div>
    <footer>
      <button class="btn sec small" id="btnExport">Exportera backup</button>
      <button class="btn sec small" id="btnImport">Importera backup</button>
      <input type="file" id="importFile" accept="application/json" hidden>
    </footer>
    <p class="hint">Datan sparas lokalt i din webbläsare – exportera en backup då och då.</p>
  </section>

  <!-- LAGER -->
  <section class="view" id="viewStock"></section>

  <!-- DETALJ -->
  <section class="view" id="viewDetail"></section>

  <!-- FORMULÄR (ny/redigera) -->
  <section class="view" id="viewForm"></section>
</main>

<div class="wheel-wrap" id="wheelWrap">
  <button class="wheel" id="btnAdd" aria-label="Lägg till iPod">
    <span class="menu">MENU</span>
    <span class="prev"><svg viewBox="0 0 24 16"><path d="M3 1h2.5v14H3z"/><path d="M14.5 1v14L5.5 8z"/><path d="M24 1v14L15 8z"/></svg></span>
    <span class="next"><svg viewBox="0 0 24 16"><path d="M0 1v14l9-7z"/><path d="M9 1v14l9-7z"/><path d="M18.5 1H21v14h-2.5z"/></svg></span>
    <span class="play"><svg viewBox="0 0 24 16"><path d="M2 1v14l11-7z"/><path d="M16.5 2h2.8v12h-2.8z"/><path d="M21.2 2H24v12h-2.8z"/></svg></span>
    <span class="wheel-center"><svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M11 3.5v15M3.5 11h15"/></svg></span>
  </button>
</div>

<script>
"use strict";
/* ================= Data ================= */
const KEY = "ipodlogg.v1";
const SKEY = "ipodlogg.stock.v1";
const STATUSES = ["köpt","reparation","till salu","såld"];
let items = load();
let stock = loadStock();
let filter = "alla";
let editingId = null;
let currentView = "viewList";

function load(){
  try{ return JSON.parse(localStorage.getItem(KEY)) || []; }
  catch(e){ return []; }
}
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); }
function loadStock(){
  try{ return JSON.parse(localStorage.getItem(SKEY)) || []; }
  catch(e){ return []; }
}
function saveStock(){ localStorage.setItem(SKEY, JSON.stringify(stock)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function find(id){ return items.find(i=>i.id===id); }

/* ================= Beräkningar ================= */
function partsSum(it){ return (it.parts||[]).reduce((s,p)=>s+(+p.cost||0),0); }
function minutesSum(it){ return (it.time||[]).reduce((s,t)=>s+(+t.min||0),0); }
function totalCost(it){ return (+it.buyPrice||0) + partsSum(it); }
function profit(it){
  if(it.status!=="såld" || it.salePrice==null || it.salePrice==="") return null;
  return (+it.salePrice) - totalCost(it);
}
function kr(n){ return new Intl.NumberFormat("sv-SE",{maximumFractionDigits:0}).format(n) + " kr"; }
function hhmm(min){
  const h = Math.floor(min/60), m = min%60;
  return (h? h+" h ":"") + (m||!h? m+" min":"");
}
function esc(s){ return String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ================= LCD ================= */
function renderLCD(){
  const sold = items.filter(i=>profit(i)!=null);
  const tot = sold.reduce((s,i)=>s+profit(i),0);
  const mins = items.reduce((s,i)=>s+minutesSum(i),0);
  const el = document.getElementById("lcdProfit");
  el.textContent = (tot>0?"+":"") + kr(tot);
  el.style.color = tot<0 ? "#7A2E2E" : "var(--lcd-ink)";
  document.getElementById("lcdCount").textContent = items.length + " st  ▮▮▮▯";
  document.getElementById("lcdSold").textContent = sold.length + " sålda";
  document.getElementById("lcdHours").textContent = hhmm(mins) + " nedlagt";
}

/* ================= Lista ================= */
function renderFilters(){
  const all = ["alla",...STATUSES];
  document.getElementById("filters").innerHTML = all.map(f=>
    `<button class="chip ${f===filter?"on":""}" data-f="${f}">${f[0].toUpperCase()+f.slice(1)}</button>`
  ).join("");
}
function renderList(){
  renderFilters(); renderLCD();
  const list = filter==="alla" ? items : items.filter(i=>i.status===filter);
  const grid = document.getElementById("grid");
  document.getElementById("empty").hidden = items.length>0;
  grid.innerHTML = list.map(it=>{
    const p = profit(it);
    const img = it.photo
      ? `<img class="thumb" src="${it.photo}" alt="">`
      : `<div class="thumb ph">🎧</div>`;
    const asking = Math.max(it.traderaPrice??0, it.vintedPrice??0);
    const money = p!=null
      ? `<span class="card-profit ${p>=0?"pos":"neg"}">${p>0?"+":""}${kr(p)}</span>`
      : (it.status==="till salu" && asking>0)
        ? `<span class="card-profit" style="color:var(--accent)">begär ${kr(asking)}</span>`
        : `<span class="card-profit mut">−${kr(totalCost(it))}</span>`;
    return `<button class="card" data-id="${it.id}">
      ${img}
      <div class="card-body">
        <div class="card-name">${esc(it.name)}</div>
        <div class="card-meta">
          <span class="badge ${it.status.replace(" ","_")}">${esc(it.status)}</span>
          ${money}
        </div>
      </div>
    </button>`;
  }).join("");
}

/* ================= Lager ================= */
let stockPhoto = null;
function renderStock(){
  renderLCD();
  const rows = stock.map(s=>{
    const img = s.photo
      ? `<img class="stock-thumb" src="${s.photo}" alt="">`
      : `<div class="stock-thumb">🔩</div>`;
    return `<div class="stock-row" data-sid="${s.id}">
      ${img}
      <div class="stock-info">
        <div class="stock-name">${esc(s.name)}</div>
        <div class="stock-price">${kr(+s.price||0)}/st</div>
      </div>
      <div class="qty">
        <button data-q="-1">−</button><b>${s.qty||0}</b><button data-q="1">+</button>
      </div>
      <button class="del" data-delstock>✕</button>
    </div>`;
  }).join("") || `<div class="row"><span class="k mut">Inga delar i lagret ännu</span></div>`;

  document.getElementById("viewStock").innerHTML = `
    <div class="panel">
      <h3>Lägg till del</h3>
      <div class="mini-form">
        <button class="stock-photo-btn" id="stPhotoBtn">+</button>
        <input type="text" id="stName" placeholder="Del (t.ex. batteri 850mAh)">
      </div>
      <div class="mini-form">
        <input type="number" id="stPrice" placeholder="pris/st (kr)" inputmode="numeric">
        <input type="number" id="stQty" placeholder="antal" inputmode="numeric" style="max-width:80px">
        <button class="btn small" id="stAdd">Lägg till</button>
      </div>
      <input type="file" id="stPhotoFile" accept="image/*" hidden>
      <p class="hint" style="text-align:left">Delarna här blir valbara som standardprodukter när du lägger till delar på en iPod.</p>
    </div>
    <div class="panel">
      <h3>I lager (${stock.reduce((s,x)=>s+(+x.qty||0),0)} st · värde ${kr(stock.reduce((s,x)=>s+(+x.qty||0)*(+x.price||0),0))})</h3>
      ${rows}
    </div>
  `;

  const v = document.getElementById("viewStock");
  v.querySelector("#stPhotoBtn").onclick = ()=>v.querySelector("#stPhotoFile").click();
  v.querySelector("#stPhotoFile").onchange = async e=>{
    const f = e.target.files[0]; if(!f) return;
    stockPhoto = await compressImage(f, 240, .7);
    v.querySelector("#stPhotoBtn").innerHTML = `<img src="${stockPhoto}" alt="">`;
  };
  v.querySelector("#stAdd").onclick = ()=>{
    const name = v.querySelector("#stName").value.trim();
    if(!name) return;
    stock.unshift({
      id: uid(),
      name,
      price: +v.querySelector("#stPrice").value||0,
      qty: +v.querySelector("#stQty").value||0,
      photo: stockPhoto
    });
    stockPhoto = null;
    saveStock(); renderStock();
  };
  v.querySelectorAll(".stock-row").forEach(row=>{
    const s = stock.find(x=>x.id===row.dataset.sid);
    row.querySelectorAll("[data-q]").forEach(b=>b.onclick=()=>{
      s.qty = Math.max(0,(+s.qty||0) + +b.dataset.q);
      saveStock(); renderStock();
    });
    row.querySelector("[data-delstock]").onclick = ()=>{
      if(confirm("Ta bort \""+s.name+"\" ur lagret?")){
        stock = stock.filter(x=>x.id!==s.id); saveStock(); renderStock();
      }
    };
  });
}

/* ================= Detalj ================= */
function renderDetail(id){
  const it = find(id); if(!it) return showView("viewList");
  const p = profit(it);
  const mins = minutesSum(it);
  const parts = (it.parts||[]).map((pt,ix)=>
    `<div class="row"><span class="k">${esc(pt.name)}</span>
     <span class="v">${kr(+pt.cost||0)} <button class="del" data-delpart="${ix}">✕</button></span></div>`
  ).join("") || `<div class="row"><span class="k mut">Inga delar ännu</span></div>`;
  const time = (it.time||[]).map((t,ix)=>
    `<div class="row"><span class="k">${esc(t.note||"Arbete")} <span class="mut">${esc(t.date||"")}</span></span>
     <span class="v">${hhmm(+t.min||0)} <button class="del" data-deltime="${ix}">✕</button></span></div>`
  ).join("") || `<div class="row"><span class="k mut">Ingen tid loggad ännu</span></div>`;

  const perHour = (p!=null && mins>0) ? Math.round(p/(mins/60)) : null;

  document.getElementById("viewDetail").innerHTML = `
    <div class="detail-head">
      <button class="btn-back" id="btnBack">‹ Tillbaka</button>
    </div>
    ${it.photo?`<img class="detail-photo" src="${it.photo}" alt="">`:""}
    <h2>${esc(it.name)}</h2>
    <div class="sub">${esc(it.model||"")} · <span class="badge ${it.status.replace(" ","_")}">${esc(it.status)}</span></div>

    <div class="panel">
      <h3>Ekonomi</h3>
      <div class="row"><span class="k">Inköpspris ${it.buyDate?`<span class="mut">${esc(it.buyDate)}</span>`:""}</span><span class="v">${kr(+it.buyPrice||0)}</span></div>
      <div class="row"><span class="k">Delar (${(it.parts||[]).length} st)</span><span class="v">${kr(partsSum(it))}</span></div>
      <div class="row"><span class="k">Total kostnad</span><span class="v">${kr(totalCost(it))}</span></div>
      ${it.status==="såld"
        ? `<div class="row"><span class="k">Såld för ${it.saleDate?`<span class="mut">${esc(it.saleDate)}</span>`:""}</span><span class="v">${kr(+it.salePrice||0)}</span></div>
           <div class="row total"><span class="k">Vinst</span><span class="v ${p>=0?"pos":"neg"}">${p>0?"+":""}${kr(p)}</span></div>
           ${perHour!=null?`<div class="row"><span class="k">Per arbetstimme</span><span class="v ${perHour>=0?"pos":"neg"}">${kr(perHour)}/h</span></div>`:""}`
        : `<div class="row total"><span class="k">Nedlagt hittills</span><span class="v">−${kr(totalCost(it))}</span></div>`}
    </div>

    ${(it.traderaPrice!=null || it.vintedPrice!=null)?`
    <div class="panel">
      <h3>Annonser</h3>
      ${it.traderaPrice!=null?`<div class="row"><span class="k">Tradera <span class="badge till_salu">${esc(it.traderaType||"köp nu")}</span></span><span class="v">${kr(it.traderaPrice)}</span></div>`:""}
      ${it.vintedPrice!=null?`<div class="row"><span class="k">Vinted</span><span class="v">${kr(it.vintedPrice)}</span></div>`:""}
      ${it.status!=="såld" && (it.traderaPrice!=null||it.vintedPrice!=null)?`<div class="row"><span class="k">Vinst vid begärt pris</span><span class="v ${Math.max(it.traderaPrice??0,it.vintedPrice??0)-totalCost(it)>=0?"pos":"neg"}">${kr(Math.max(it.traderaPrice??0,it.vintedPrice??0)-totalCost(it))}</span></div>`:""}
    </div>`:""}

    <div class="panel">
      <h3>Delar</h3>
      ${parts}
      ${stock.length?`<div class="mini-form">
        <select id="partSel">
          <option value="">Egen del…</option>
          ${stock.map(s=>`<option value="${s.id}">${esc(s.name)} · ${kr(+s.price||0)}${(+s.qty||0)>0?` · ${s.qty} i lager`:" · slut"}</option>`).join("")}
        </select>
      </div>`:""}
      <div class="mini-form">
        <input type="text" id="partName" placeholder="Del (t.ex. batteri)">
        <input type="number" id="partCost" placeholder="kr" inputmode="numeric" style="max-width:90px">
        <button class="btn small" id="btnAddPart">Lägg till</button>
      </div>
    </div>

    <div class="panel">
      <h3>Tid</h3>
      ${time}
      <div class="mini-form">
        <input type="text" id="timeNote" placeholder="Vad gjorde du?">
        <input type="number" id="timeMin" placeholder="min" inputmode="numeric" style="max-width:80px">
        <button class="btn small" id="btnAddTime">Logga</button>
      </div>
      ${mins?`<p class="hint" style="text-align:left">Totalt: ${hhmm(mins)}</p>`:""}
    </div>

    ${it.notes?`<div class="panel"><h3>Anteckningar</h3><div style="font-size:15px;white-space:pre-wrap">${esc(it.notes)}</div></div>`:""}

    <div class="btn-row">
      <button class="btn sec" id="btnEdit">Redigera</button>
      ${it.status!=="såld"?`<button class="btn accent" id="btnSell">Markera som såld</button>`:""}
    </div>
    <div class="btn-row">
      <button class="btn danger" id="btnDelete">Ta bort</button>
    </div>
  `;

  const v = document.getElementById("viewDetail");
  v.querySelector("#btnBack").onclick = ()=>showView("viewList");
  v.querySelector("#btnEdit").onclick = ()=>openForm(id);
  const sell = v.querySelector("#btnSell");
  if(sell) sell.onclick = ()=>{
    const price = prompt("Vad såldes den för? (kr)");
    if(price===null) return;
    it.salePrice = +price||0;
    it.saleDate = new Date().toISOString().slice(0,10);
    it.status = "såld";
    save(); renderDetail(id);
  };
  v.querySelector("#btnDelete").onclick = ()=>{
    if(confirm("Ta bort \""+it.name+"\"? Det går inte att ångra.")){
      items = items.filter(x=>x.id!==id); save(); showView("viewList");
    }
  };
  const sel = v.querySelector("#partSel");
  if(sel) sel.onchange = ()=>{
    const s = stock.find(x=>x.id===sel.value);
    if(s){
      v.querySelector("#partName").value = s.name;
      v.querySelector("#partCost").value = +s.price||0;
    }
  };
  v.querySelector("#btnAddPart").onclick = ()=>{
    const n = v.querySelector("#partName").value.trim();
    const c = +v.querySelector("#partCost").value||0;
    if(!n) return;
    (it.parts??=[]).push({name:n,cost:c});
    // dra av från lagret om delen valdes därifrån
    if(sel && sel.value){
      const s = stock.find(x=>x.id===sel.value);
      if(s && (+s.qty||0)>0){ s.qty--; saveStock(); }
    }
    save(); renderDetail(id);
  };
  v.querySelector("#btnAddTime").onclick = ()=>{
    const n = v.querySelector("#timeNote").value.trim();
    const m = +v.querySelector("#timeMin").value||0;
    if(!m) return;
    (it.time??=[]).push({note:n,min:m,date:new Date().toISOString().slice(0,10)}); save(); renderDetail(id);
  };
  v.querySelectorAll("[data-delpart]").forEach(b=>b.onclick=()=>{ it.parts.splice(+b.dataset.delpart,1); save(); renderDetail(id); });
  v.querySelectorAll("[data-deltime]").forEach(b=>b.onclick=()=>{ it.time.splice(+b.dataset.deltime,1); save(); renderDetail(id); });
}

/* ================= Formulär ================= */
function openForm(id){
  editingId = id||null;
  const it = id? find(id) : {status:"köpt"};
  document.getElementById("viewForm").innerHTML = `
    <div class="detail-head"><button class="btn-back" id="btnCancel">‹ Avbryt</button></div>
    <h2>${id?"Redigera":"Ny iPod"}</h2>

    <label>Bild</label>
    <button class="photo-pick" id="photoPick">${it.photo?`<img src="${it.photo}" alt="">`:"Tryck för att ta / välja bild"}</button>
    <input type="file" id="photoFile" accept="image/*" hidden>

    <label>Namn *</label>
    <input type="text" id="fName" value="${esc(it.name||"")}" placeholder="t.ex. iPod Classic 5th gen 30GB">
    <label>Modell / detaljer</label>
    <input type="text" id="fModel" value="${esc(it.model||"")}" placeholder="t.ex. A1136, svart">
    <div class="grid2">
      <div><label>Inköpspris (kr)</label><input type="number" id="fBuy" inputmode="numeric" value="${it.buyPrice??""}"></div>
      <div><label>Inköpsdatum</label><input type="date" id="fBuyDate" value="${it.buyDate||new Date().toISOString().slice(0,10)}"></div>
    </div>
    <label>Status</label>
    <select id="fStatus">${STATUSES.map(s=>`<option ${s===it.status?"selected":""}>${s}</option>`).join("")}</select>

    <label>Annonser (frivilligt)</label>
    <div class="grid2">
      <div><label style="margin-top:0">Tradera-pris (kr)</label><input type="number" id="fTradera" inputmode="numeric" value="${it.traderaPrice??""}"></div>
      <div><label style="margin-top:0">Tradera-typ</label>
        <select id="fTraderaType">
          <option ${it.traderaType==="köp nu"?"selected":""}>köp nu</option>
          <option ${it.traderaType==="auktion"?"selected":""}>auktion</option>
        </select>
      </div>
    </div>
    <div class="grid2" style="margin-top:10px">
      <div><label style="margin-top:0">Vinted-pris (kr)</label><input type="number" id="fVinted" inputmode="numeric" value="${it.vintedPrice??""}"></div>
      <div></div>
    </div>

    <div class="grid2" id="saleFields" ${it.status==="såld"?"":"hidden"}>
      <div><label>Såld för (kr)</label><input type="number" id="fSale" inputmode="numeric" value="${it.salePrice??""}"></div>
      <div><label>Säljdatum</label><input type="date" id="fSaleDate" value="${it.saleDate||""}"></div>
    </div>
    <label>Anteckningar</label>
    <textarea id="fNotes" placeholder="Skick, fel, planer…">${esc(it.notes||"")}</textarea>

    <div class="btn-row" style="margin-top:18px">
      <button class="btn" id="btnSave">Spara</button>
    </div>
  `;
  showView("viewForm");

  const v = document.getElementById("viewForm");
  let photo = it.photo||null;
  v.querySelector("#btnCancel").onclick = ()=> id? (showView("viewDetail"),renderDetail(id)) : showView("viewList");
  v.querySelector("#photoPick").onclick = ()=>v.querySelector("#photoFile").click();
  v.querySelector("#photoFile").onchange = async e=>{
    const f = e.target.files[0]; if(!f) return;
    photo = await compressImage(f);
    v.querySelector("#photoPick").innerHTML = `<img src="${photo}" alt="">`;
  };
  v.querySelector("#fStatus").onchange = e=>{
    v.querySelector("#saleFields").hidden = e.target.value!=="såld";
  };
  v.querySelector("#btnSave").onclick = ()=>{
    const name = v.querySelector("#fName").value.trim();
    if(!name){ alert("Namn krävs."); return; }
    const data = {
      name,
      model: v.querySelector("#fModel").value.trim(),
      buyPrice: +v.querySelector("#fBuy").value||0,
      buyDate: v.querySelector("#fBuyDate").value,
      status: v.querySelector("#fStatus").value,
      traderaPrice: v.querySelector("#fTradera").value===""? null : +v.querySelector("#fTradera").value,
      traderaType: v.querySelector("#fTraderaType").value,
      vintedPrice: v.querySelector("#fVinted").value===""? null : +v.querySelector("#fVinted").value,
      salePrice: v.querySelector("#fSale").value===""? null : +v.querySelector("#fSale").value,
      saleDate: v.querySelector("#fSaleDate").value||null,
      notes: v.querySelector("#fNotes").value,
      photo
    };
    if(editingId){
      Object.assign(find(editingId), data);
      save(); renderDetail(editingId); showView("viewDetail");
    }else{
      items.unshift({id:uid(),parts:[],time:[],...data});
      save(); showView("viewList"); renderList();
    }
  };
}

/* Komprimera bilder så localStorage räcker länge */
function compressImage(file, max=900, quality=.78){
  return new Promise(res=>{
    const img = new Image();
    img.onload = ()=>{
      const scale = Math.min(1, max/Math.max(img.width,img.height));
      const c = document.createElement("canvas");
      c.width = Math.round(img.width*scale);
      c.height = Math.round(img.height*scale);
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL("image/jpeg",quality));
      URL.revokeObjectURL(img.src);
    };
    img.src = URL.createObjectURL(file);
  });
}

/* ================= Vyer & händelser ================= */
function showView(id){
  currentView = id;
  document.querySelectorAll(".view").forEach(v=>v.classList.toggle("on",v.id===id));
  const isTabView = id==="viewList" || id==="viewStock";
  document.getElementById("wheelWrap").style.display = isTabView?"block":"none";
  document.getElementById("tabs").style.display = isTabView?"flex":"none";
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.tab===id));
  if(id==="viewList") renderList();
  if(id==="viewStock") renderStock();
  window.scrollTo(0,0);
}
document.getElementById("tabs").onclick = e=>{
  const t = e.target.closest("[data-tab]"); if(!t) return;
  showView(t.dataset.tab);
};
document.getElementById("btnAdd").onclick = ()=>{
  if(currentView==="viewStock"){
    document.getElementById("stName")?.focus();
    window.scrollTo({top:0,behavior:"smooth"});
  }else{
    openForm(null);
  }
};
document.getElementById("filters").onclick = e=>{
  const f = e.target.closest("[data-f]"); if(!f) return;
  filter = f.dataset.f; renderList();
};
document.getElementById("grid").onclick = e=>{
  const c = e.target.closest("[data-id]"); if(!c) return;
  renderDetail(c.dataset.id); showView("viewDetail");
};

/* Backup */
document.getElementById("btnExport").onclick = ()=>{
  const blob = new Blob([JSON.stringify({items,stock},null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ipod-loggen-backup-"+new Date().toISOString().slice(0,10)+".json";
  a.click(); URL.revokeObjectURL(a.href);
};
document.getElementById("btnImport").onclick = ()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange = e=>{
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const data = JSON.parse(r.result);
      const newItems = Array.isArray(data)? data : data.items;
      const newStock = Array.isArray(data)? stock : (data.stock||[]);
      if(!Array.isArray(newItems)) throw 0;
      if(confirm("Ersätt nuvarande data med backupen ("+newItems.length+" iPods, "+newStock.length+" lagerdelar)?")){
        items = newItems; stock = newStock;
        save(); saveStock(); showView(currentView);
      }
    }catch(err){ alert("Kunde inte läsa filen – är det en giltig backup?"); }
  };
  r.readAsText(f);
};

/* Service worker + uppdaterings-banner */
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  navigator.serviceWorker.register("sw.js").then(reg=>{
    reg.addEventListener("updatefound", ()=>{
      const nw = reg.installing;
      nw.addEventListener("statechange", ()=>{
        if(nw.state==="installed" && navigator.serviceWorker.controller) showUpdateToast(reg);
      });
    });
    if(reg.waiting && navigator.serviceWorker.controller) showUpdateToast(reg);
  }).catch(()=>{});
  let refreshing = false;
  navigator.serviceWorker.addEventListener("controllerchange", ()=>{
    if(refreshing) return; refreshing = true; location.reload();
  });
}
function showUpdateToast(reg){
  if(document.querySelector(".update-toast")) return;
  const t = document.createElement("div");
  t.className = "update-toast";
  t.innerHTML = `Ny version finns <button>Uppdatera</button>`;
  t.querySelector("button").onclick = ()=>reg.waiting?.postMessage({type:"SKIP_WAITING"});
  document.body.appendChild(t);
}

renderList();
</script>
